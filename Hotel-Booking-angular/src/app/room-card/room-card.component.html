<div class="card shadow-sm custom-card border-0 mb-5">
  
  <div class="position-relative mb-4" style="height: 220px; overflow: hidden; border-radius: 15px 15px 0 0;">
    <img [src]="roomData.image" 
         class="card-img-top" 
         [alt]="roomData.name"
         style="object-fit: cover; width: 100%; height: 100%; transition: transform 0.3s ease;">
    
    <span class="badge bg-primary position-absolute top-0 end-0 m-3 shadow-sm px-3 py-2">
      {{ roomData.type }}
    </span>
  </div>

  <div class="card-body d-flex flex-column pt-0 pb-4">
    
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title text-primary fw-bold mb-0">{{ roomData.name }}</h5>
      <span class="badge bg-light text-dark border d-flex align-items-center">
        <i class="fa-solid fa-star text-warning me-1"></i>{{ roomData.rating }}
      </span>
    </div>

    <p class="text-muted small mb-3">
      {{ roomData.description }}
    </p>

    <div class="mb-4">
      <span *ngFor="let amenity of roomData.amenities" 
            class="badge rounded-pill bg-light text-secondary me-1 border fw-normal"
            style="font-size: 0.75rem; padding: 5px 10px;">
        {{ amenity }}
      </span>
    </div>

    <div class="mt-auto">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <span class="text-muted small d-block">Price per night</span>
          <span class="h4 mb-0 fw-bold text-primary">${{ roomData.price }}</span>
        </div>
        <span *ngIf="!roomData.available" class="badge bg-danger-subtle text-danger px-3 py-2">
          Sold Out
        </span>
      </div>
      
      <button (click)="onBookNow()" 
              class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm" 
              [disabled]="!roomData.available">
        <i class="fa-solid fa-calendar-check me-2"></i>
        {{ roomData.available ? 'Book Now' : 'Not Available' }}
      </button>
    </div>

  </div> 
</div>
