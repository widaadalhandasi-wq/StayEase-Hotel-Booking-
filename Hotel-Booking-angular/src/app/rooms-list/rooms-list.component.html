<div class="container mt-4">
  <div class="form-check form-switch mb-4">
    <input class="form-check-input" type="checkbox" [(ngModel)]="onlyAvailable" (change)="loadRooms()">
    <label class="form-check-label">Show only available</label>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let r of rooms">
      <app-room-card [roomData]="r" (select)="handleSelection($event)"></app-room-card>
    </div>
  </div>
</div>
