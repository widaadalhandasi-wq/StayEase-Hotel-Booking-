<header class="hero-section position-relative hero-full-screen d-flex align-items-center">
  
  <div class="position-absolute top-0 start-0 w-100 h-100 z-0">
    <div class="hero-overlay position-absolute top-0 start-0 w-100 h-100"></div>
    <img [src]="heroImage" 
         alt="Hotel Hero" 
         class="w-100 h-100 object-fit-cover">
  </div>

  <div class="container text-center text-white position-relative z-1">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <h1 class="hero-title mb-4">
          Your Escape Redefined
        </h1>
        
        <p class="hero-subtitle mb-5">
          Experience world-class hospitality and breathtaking views in the heart of the coast.
        </p>

        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
          <a routerLink="/rooms" class="btn btn-outline-light btn-lg px-5 py-3 fw-semibold shadow-sm">
            Explore Rooms
          </a>

          <a routerLink="/booking" class="btn btn-primary btn-lg px-5 py-3 fw-semibold shadow-sm">
            Book Now
          </a>
        </div>

      </div>
    </div>
  </div>
</header>
